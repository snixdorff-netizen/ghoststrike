services:
  ada-iq:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ADA_IQ_PORT:-8000}:8000"
    environment:
      ADA_IQ_DB_PATH: /app/data/ada_iq.db
      ADA_IQ_SEED_PATH: /app/src/ada_iq/data/demo_projects.json
      ADA_IQ_AUTO_SEED: ${ADA_IQ_AUTO_SEED:-true}
      ADA_IQ_PORT: 8000
    volumes:
      - ./data:/app/data
  ada-iq-worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ADA_IQ_DB_PATH: /app/data/ada_iq.db
      ADA_IQ_SEED_PATH: /app/src/ada_iq/data/demo_projects.json
      ADA_IQ_AUTO_SEED: ${ADA_IQ_AUTO_SEED:-true}
    command: ["python", "-m", "ada_iq.worker"]
    volumes:
      - ./data:/app/data
